name: Nightly Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  VIBEMUSIC_NIGHTLY_ENDPOINT: "https://github.com/gjpgabayeron/vibemusic/releases/download/nightly/latest.json"

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      NEW_VERSION: ${{ steps.version.outputs.NEW_VERSION }}
      DISPLAY_VERSION: ${{ steps.version.outputs.DISPLAY_VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Bump patch version
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $currentVersion = $pkg.version
          $parts = $currentVersion -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2] + 1
          $newVersion = "$major.$minor.$patch"

          echo "CURRENT_VERSION=$currentVersion" >> $env:GITHUB_OUTPUT
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT
          echo "DISPLAY_VERSION=$newVersion-nightly" >> $env:GITHUB_OUTPUT

          $pkg.version = $newVersion
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConf.version = $newVersion
          $tauriConf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$newVersion`"" | Set-Content src-tauri/Cargo.toml

          Write-Host "Bumped version: $currentVersion -> $newVersion"

      - run: npm run verify:versions

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header --output changelog.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.NEW_VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin dev

      - name: Clean up existing nightly tags
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          $tags = @(git tag -l "*-nightly.*")
          if ($tags.Count -gt 0) {
            git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"
            foreach ($tag in $tags) {
              Write-Host "Deleting: $tag"
              git push origin --delete $tag 2>$null
              git tag -d $tag 2>$null
            }
            Write-Host "Cleaned up $($tags.Count) nightly tag(s)"
          } else {
            Write-Host "No nightly tags to clean up"
          }

  build:
    needs: bump
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact-name: macos-aarch64
            bundle-path: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact-name: macos-x86_64
            bundle-path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            artifact-name: linux-x86_64
            bundle-path: src-tauri/target/release/bundle
          - platform: windows-latest
            args: ""
            artifact-name: windows-x86_64
            bundle-path: src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: dev

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Rename artifacts to canonical format
        shell: pwsh
        run: |
          $version = "${{ needs.bump.outputs.NEW_VERSION }}"
          $bundle = '${{ matrix.bundle-path }}'
          switch ('${{ matrix.artifact-name }}') {
            'macos-aarch64' {
              Get-ChildItem $bundle -Recurse -File | Where-Object { $_.Name -match '\.tar\.gz' } | ForEach-Object {
                $suffix = if ($_.Name -match '\.sig$') { '.sig' } else { '' }
                Rename-Item -Path $_.FullName -NewName "VibeMusic-darwin-aarch64-v$version.app.tar.gz$suffix"
              }
            }
            'macos-x86_64' {
              Get-ChildItem $bundle -Recurse -File | Where-Object { $_.Name -match '\.tar\.gz' } | ForEach-Object {
                $suffix = if ($_.Name -match '\.sig$') { '.sig' } else { '' }
                Rename-Item -Path $_.FullName -NewName "VibeMusic-darwin-x64-v$version.app.tar.gz$suffix"
              }
            }
            'windows-x86_64' {
              Get-ChildItem $bundle -Recurse -File | Where-Object { $_.Name -match '\.(msi|exe)(\.sig)?$' } | ForEach-Object {
                if ($_.Name -match '\.msi\.sig$')   { Rename-Item -Path $_.FullName -NewName "VibeMusic-x64-v$version.msi.sig" }
                elseif ($_.Name -match '\.exe\.sig$') { Rename-Item -Path $_.FullName -NewName "VibeMusic-x64-v$version.exe.sig" }
                elseif ($_.Name -match '\.msi$')    { Rename-Item -Path $_.FullName -NewName "VibeMusic-x64-v$version.msi" }
                elseif ($_.Name -match '\.exe$')    { Rename-Item -Path $_.FullName -NewName "VibeMusic-x64-v$version.exe" }
              }
            }
            'linux-x86_64' {
              Get-ChildItem $bundle -Recurse -File | Where-Object { $_.Name -match '\.AppImage' } | ForEach-Object {
                if ($_.Name -match '\.AppImage\.tar\.gz\.sig$') { Rename-Item -Path $_.FullName -NewName "VibeMusic-linux-x86_64-v$version.AppImage.tar.gz.sig" }
                elseif ($_.Name -match '\.AppImage\.tar\.gz$')  { Rename-Item -Path $_.FullName -NewName "VibeMusic-linux-x86_64-v$version.AppImage.tar.gz" }
                elseif ($_.Name -match '\.AppImage\.sig$')     { Rename-Item -Path $_.FullName -NewName "VibeMusic-linux-x86_64-v$version.AppImage.sig" }
                elseif ($_.Name -match '\.AppImage$')          { Rename-Item -Path $_.FullName -NewName "VibeMusic-linux-x86_64-v$version.AppImage" }
              }
            }
          }

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error

  release:
    needs: [build, bump]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: changelog
          path: artifacts

      - name: Ensure nightly release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly --json tagName 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create nightly --title "Vibe Music Nightly" --notes "" --prerelease
            Write-Host "Created nightly release"
          } else {
            Write-Host "Nightly release already exists"
          }

      - name: Upload artifacts to nightly release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $newAssets = @()
          Get-ChildItem -Path artifacts -Recurse -File | Where-Object {
            $_.Name -match '^VibeMusic-' -or $_.Name -eq 'latest.json'
          } | ForEach-Object {
            $newAssets += $_.Name
            Write-Host "Uploading: $($_.Name)"
            gh release upload nightly "$($_.FullName)" --clobber
          }

          $existingAssets = gh release view nightly --json assets --jq '.assets[].name' 2>$null
          if ($existingAssets) {
            foreach ($asset in $existingAssets) {
              if ($asset -notin $newAssets) {
                Write-Host "Deleting stale asset: $asset"
                gh release delete-asset nightly $asset --yes
              }
            }
          }

      - name: Update release metadata
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.bump.outputs.NEW_VERSION }}"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/nightly"

          # Generate download table
          $patterns = @{
            'windows-x86_64' = '^VibeMusic-x64-v[\d.]+\.(msi|exe)$'
            'darwin-x86_64'  = '^VibeMusic-darwin-x64-v[\d.]+\.app\.tar\.gz$'
            'darwin-aarch64' = '^VibeMusic-darwin-aarch64-v[\d.]+\.app\.tar\.gz$'
            'linux-x86_64'   = '^VibeMusic-linux-x86_64-v[\d.]+\.AppImage(\.tar\.gz)?$'
          }
          $osLabels = @{
            'windows-x86_64' = 'Windows x64'
            'darwin-x86_64'  = 'macOS Intel'
            'darwin-aarch64' = 'macOS Apple Silicon'
            'linux-x86_64'   = 'Linux x64'
          }

          $rows = @()
          $shaBlock = ""
          Get-ChildItem -Path artifacts -Recurse -File | Where-Object { $_.Name -match '^VibeMusic-' -and $_.Name -notmatch '\.sig$' -and $_.Name -ne 'latest.json' } | ForEach-Object {
            $sha = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            $filename = $_.Name
            $url = "$baseUrl/$([Uri]::EscapeDataString($filename))"
            $osLabel = ""
            foreach ($key in $patterns.Keys) {
              if ($filename -match $patterns[$key]) {
                $osLabel = $osLabels[$key]
                break
              }
            }
            $rows += "| $osLabel | [$filename]($url) | $sha |"
            $shaBlock += "$sha  $filename`n"
          }

          $changelog = Get-Content artifacts/changelog.md -Raw

          $nl = [Environment]::NewLine
          $bodyLines = @(
            "🌙 **Nightly Build** - Version $version",
            "",
            "> ⚠️ This is a rolling nightly release with the latest changes from the dev branch. Nightly builds may be unstable. For stable releases, switch to the stable update channel.",
            "",
            "### Changelog",
            "",
            $changelog,
            "",
            "## Downloads",
            "",
            "| OS | File | SHA256 |",
            "|---|---|---|"
          )
          foreach ($r in $rows) { $bodyLines += $r }
          $bodyLines += ""
          $bodyLines += "### SHA256 Checksums"
          $bodyLines += '```'
          $bodyLines += $shaBlock.Trim()
          $bodyLines += '```'
          $body = $bodyLines -join $nl

          Set-Content body.md $body
          gh release edit nightly --title "Vibe Music $version-nightly" --notes-file body.md

      - name: Generate and upload combined latest.json
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.bump.outputs.NEW_VERSION }}"
          $repo = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/nightly"
          $pubDate = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ss") + "Z"

          $patterns = @{
            'windows-x86_64' = '^VibeMusic-x64-v[\d.]+\.(msi|exe)$'
            'darwin-x86_64'  = '^VibeMusic-darwin-x64-v[\d.]+\.app\.tar\.gz$'
            'darwin-aarch64' = '^VibeMusic-darwin-aarch64-v[\d.]+\.app\.tar\.gz$'
            'linux-x86_64'   = '^VibeMusic-linux-x86_64-v[\d.]+\.AppImage(\.tar\.gz)?$'
          }

          # Read changelog for notes
          $notes = ""
          $changelogPath = Join-Path artifacts "changelog.md"
          if (Test-Path $changelogPath) {
            $notes = (Get-Content $changelogPath -Raw).Trim()
          }

          $platforms = @{}
          Get-ChildItem -Path artifacts -Recurse -File | Where-Object {
            $_.Name -match '^VibeMusic-'
          } | ForEach-Object {
            $filename = $_.Name
            foreach ($key in $patterns.Keys) {
              if ($filename -match $patterns[$key]) {
                $sigFile = Join-Path $_.DirectoryName "$filename.sig"
                $signature = ""
                if (Test-Path $sigFile) {
                  $signature = (Get-Content $sigFile -Raw).Trim()
                }
                $platforms[$key] = @{
                  url = "$baseUrl/$([Uri]::EscapeDataString($filename))"
                  signature = $signature
                }
                break
              }
            }
          }

          $latestJson = @{
            version = $version
            pub_date = $pubDate
            notes = $notes
            platforms = $platforms
          }

          $jsonPath = Join-Path artifacts "latest.json"
          $latestJson | ConvertTo-Json -Depth 10 | Set-Content $jsonPath
          Write-Host "Generated latest.json:"
          Get-Content $jsonPath

          gh release upload nightly $jsonPath --clobber
          Write-Host "Uploaded combined latest.json"
