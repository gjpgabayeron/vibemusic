[changelog]
header = """
# Changelog

All notable changes to Vibe Music will be documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% set groups = commits | group_by(attribute="group") %}
{% set order = ["✨ Features", "🐛 Bug Fixes", "⚡ Performance", "♻️ Refactoring", "📚 Documentation", "🎨 Styling", "🧪 Testing", "🔒 Security", "🔧 Miscellaneous"] %}
{% for group_name in order %}
{% if groups[group_name] %}
    ### {{ group_name }}
    {% for commit in groups[group_name] %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}\
    {% endfor %}
{% endif %}
{% endfor %}
"""
footer = """
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactoring" },
    { message = "^docs", group = "📚 Documentation" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore: bump version", skip = true },
    { message = "^chore", group = "🔧 Miscellaneous" },
    { body = ".*security", group = "🔒 Security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "nightly"
topo_order = false
sort_commits = "oldest"
